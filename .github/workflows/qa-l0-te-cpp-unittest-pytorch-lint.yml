name: QA L0 - Core Unit & Lint Tests

on:
  push:
    branches: main
    paths:
      - '.github/workflows/qa-l0-te-cpp-unittest-pytorch-lint.yml'
      - 'qa/L0_pytorch_lint/**'
      - 'transformer_engine/**'
      - 'tests/pytorch/**'
  pull_request:
    branches: main
    paths:
      - '.github/workflows/qa-l0-te-cpp-unittest-pytorch-lint.yml'
      - 'qa/L0_pytorch_lint/**'
      - 'transformer_engine/**'
      - 'tests/pytorch/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  run-qa-l0-core-tests:
    runs-on: [ dx4-nvidia-8gpu-v1 ]
    defaults:
      run:
        shell: bash
    env:
      DOCKER_IMAGE: harbor.baai.ac.cn/flagscale/cuda12.8.1-torch2.7.1-python3.10-te2.9:20260209
      CONTAINER_NAME: te-test-${{ github.run_id }}
    steps:
      - name: Start Docker Container
        run: |
          docker pull $DOCKER_IMAGE
          docker run -d \
            --name $CONTAINER_NAME \
            --gpus all \
            --shm-size=500g \
            --privileged \
            --ipc=host \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --ulimit nofile=65535:65535 \
            --user root \
            -e GITHUB_WORKSPACE=$GITHUB_WORKSPACE \
            $DOCKER_IMAGE \
            sleep infinity

      - name: Checkout Code
        run: |
          docker exec -i $CONTAINER_NAME bash << 'EOF'
          git clone --depth 1 --recurse-submodules \
            https://github.com/${{ github.event.pull_request.head.repo.full_name || github.repository }}.git \
            -b ${{ github.event.pull_request.head.ref || github.ref_name }} \
            $GITHUB_WORKSPACE
          cd $GITHUB_WORKSPACE
          git config --global --add safe.directory $GITHUB_WORKSPACE
          EOF

      - name: Install Dependencies & Build Transformer Engine
        # timeout-minutes: 40
        run: |
          docker exec -i \
            -w $GITHUB_WORKSPACE \
            -e NVTE_FRAMEWORK=pytorch \
            -e TE_WITH_NCCL=1 \
            $CONTAINER_NAME bash << 'EOF'
          # Activate conda environment
          echo "=== Activating Conda Environment ==="
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate flagscale-train

          # Install Python dependencies with version pinning
          echo "=== Installing Python Dependencies ==="
          pip install transformers expecttest

          # Build and install transformer_engine with verbose output
          echo "=== Building & Installing Transformer Engine ==="
          pip install --no-build-isolation -vvv . --no-deps

          # Verify TE installation with version check
          echo "=== Verifying Transformer Engine Installation ==="
          python3 tests/pytorch/test_sanity_import.py
          EOF

      - name: Verify GPU Availability & Health
        run: |
          docker exec -i -w $GITHUB_WORKSPACE $CONTAINER_NAME bash << 'EOF'
          echo "=== Checking GPU Status ==="
          source .github/workflows/scripts/gpu_check.sh
          wait_for_gpu
          EOF

      # too heavy, disabled for now
      # - name: Run L0 C++ Unit Tests
      #   # timeout-minutes: 60
      #   env:
      #     TE_PATH: .
      #   run: |
      #     docker exec -i $CONTAINER_NAME bash << 'EOF'
      #     source /opt/miniconda3/etc/profile.d/conda.sh
      #     conda activate flagscale-train
      #     TE_LIB_PATH=$(pip3 show transformer-engine | grep -E "Location:|Editable project location:" | tail -n 1 | awk '{print $NF}')
      #     TE_CPP_LIB_PATH="${TE_LIB_PATH}/transformer_engine"
      #     export CMAKE_PREFIX_PATH="${TE_CPP_LIB_PATH}:${CMAKE_PREFIX_PATH}"
      #     export LD_LIBRARY_PATH="${TE_CPP_LIB_PATH}:${LD_LIBRARY_PATH}"
      #     NUM_PHYSICAL_CORES=$(nproc)
      #     NUM_PARALLEL_JOBS=$(nproc)
      #     cd tests/cpp
      #     cmake -GNinja -Bbuild . -DTE_LIB_PATH="${TE_CPP_LIB_PATH}"
      #     cmake --build build
      #     export OMP_NUM_THREADS=$((NUM_PHYSICAL_CORES / NUM_PARALLEL_JOBS))
      #     echo "=== Running C++ Unit Tests ==="
      #     ctest --test-dir build -j$NUM_PARALLEL_JOBS
      #     EOF

      - name: PyTorch C++ Lint
        # timeout-minutes: 5
        continue-on-error: true
        run: |
          docker exec -i \
            -w $GITHUB_WORKSPACE \
            -e CPP_ONLY=1 \
            -e TE_PATH=. \
            $CONTAINER_NAME bash << 'EOF'
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate flagscale-train

          echo "=== Running C++ Lint Checks ==="
          bash ./qa/L0_pytorch_lint/test.sh || true

          echo ""
          echo "-----------------------------------------------------"
          echo "Note: Pylint check ignores errors C0411 (incorrect import position) and W0611 (unused import), which can be achieved by adding the parameter --disable=C0411,W0611"
          echo "-----------------------------------------------------"
          EOF

      - name: PyTorch Python Lint
        # timeout-minutes: 5
        continue-on-error: true
        run: |
          docker exec -i \
            -e PYTHON_ONLY=1 \
            -e TE_PATH=. \
            $CONTAINER_NAME bash << 'EOF'
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate flagscale-train

          echo "=== Running PyTorch Lint Checks ==="
          bash ./qa/L0_pytorch_lint/test.sh || true

          echo ""
          echo "-----------------------------------------------------"
          echo "Note: Pylint check ignores errors C0411 (incorrect import position) and W0611 (unused import), which can be achieved by adding the parameter --disable=C0411,W0611"
          echo "-----------------------------------------------------"
          EOF

      - name: Run L0 PyTorch Debug Unit Tests
        # timeout-minutes: 10
        run: |
          docker exec -i \
            -e TE_PATH=. \
            $CONTAINER_NAME bash << 'EOF'
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate flagscale-train

          echo "=== Running L0 PyTorch Debug Unit Tests ==="
          bash ./qa/L0_pytorch_debug_unittest/test.sh
          EOF

      - name: Run L0 PyTorch Core Unit Tests
        # timeout-minutes: 10
        run: |
          docker exec -i \
            -e TE_PATH=. \
            -e TE_FL_PREFER=vendor \
            $CONTAINER_NAME bash << 'EOF'
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate flagscale-train

          export TE_LIB_PATH=$(python -c "import site; print(site.getsitepackages()[0])")/transformer_engine

          echo "=== Running L0 PyTorch Core Unit Tests ==="
          bash ./qa/L0_pytorch_unittest/test.sh
          EOF

      - name: Sleep before stopping container on failure
        if: failure()
        run: |
          echo "=== Workflow failed. Sleeping 48h to allow debugging before container stops ==="
          echo "Container will remain running until $(date -d '+48 hours' 2>/dev/null || date -v+48H) ..."
          sleep 172800

      - name: Stop and Remove Docker Container
        if: always()
        run: |
          docker stop $CONTAINER_NAME || true
          docker rm $CONTAINER_NAME || true
